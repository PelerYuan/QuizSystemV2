version: '3.8'

services:
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://database:27017/quizSystem
      - PORT=3000
      - SECRET=your_super_secret_key_change_this
      - ADMIN_PASSWORD=your_admin_password

  database:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: